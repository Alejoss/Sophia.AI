services:
  nginx:
    image: ${GHCR_IMAGE_PREFIX:?Set GHCR_IMAGE_PREFIX}-nginx:${IMAGE_TAG:-main}
    pull_policy: always
    container_name: acbc_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-./nginx/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  backend:
    image: ${GHCR_IMAGE_PREFIX:?Set GHCR_IMAGE_PREFIX}-backend:${IMAGE_TAG:-main}
    pull_policy: always
    container_name: acbc_backend_prod
    # No volume mounts in production - code is baked into image
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ./acbc_app/.env
    environment:
      - ENVIRONMENT=PRODUCTION
    # Don't expose port directly - accessed via nginx
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${GHCR_IMAGE_PREFIX:?Set GHCR_IMAGE_PREFIX}-frontend:${IMAGE_TAG:-main}
    pull_policy: always
    container_name: acbc_frontend_prod
    # No volume mounts in production - static files are baked into image
    # Don't expose port directly - accessed via nginx
    expose:
      - "80"
    networks:
      - app_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      # Use 127.0.0.1 to avoid localhost IPv6 resolution issues in alpine/busybox wget.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15
    container_name: acbc_postgres_prod
    # Credentials come from acbc_app/.env only — avoid ${DB_PASSWORD} interpolation
    # here so Docker Compose does not treat $ in passwords as variable references.
    env_file:
      - ./acbc_app/.env
    environment:
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" || pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  # certbot dirs (./certbot/www, ./certbot/certs) are bind-mounted; created by setup-ssl.sh
