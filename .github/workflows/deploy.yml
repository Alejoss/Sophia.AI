name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: any_password
          POSTGRES_DB: ACADEMIA_BLOCKCHAIN_DB
          POSTGRES_USER: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r acbc_app/requirements.txt

    - name: Set up environment variables
      run: |
        echo "ACADEMIA_BLOCKCHAIN_SKEY=test-secret-key-for-ci" >> $GITHUB_ENV
        echo "POSTGRES_PASSWORD=any_password" >> $GITHUB_ENV
        echo "DB_NAME=ACADEMIA_BLOCKCHAIN_DB" >> $GITHUB_ENV
        echo "POSTGRES_USER=postgres" >> $GITHUB_ENV
        echo "DB_HOST=localhost" >> $GITHUB_ENV
        echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
        echo "GOOGLE_OAUTH_CLIENT_ID=647602001183-2u5t54maog49bc53tf8hkltmv5hhb07s.apps.googleusercontent.com" >> $GITHUB_ENV
        echo "VITE_API_URL=http://localhost:8000" >> $GITHUB_ENV
        echo "DEBUG=True" >> $GITHUB_ENV
        echo "CI=True" >> $GITHUB_ENV
        echo "ENVIRONMENT=CI" >> $GITHUB_ENV
        echo "DJANGO_SETTINGS_MODULE=academia_blockchain.settings" >> $GITHUB_ENV

    - name: Install PostgreSQL client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Create logs directory
      run: |
        mkdir -p acbc_app/logs

    - name: Wait for PostgreSQL to be ready
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
        echo "PostgreSQL is ready!"

    - name: Test database connection
      run: |
        cd acbc_app
        python -c "
        import os
        for key in ['DB_HOST', 'POSTGRES_PORT', 'DB_NAME', 'POSTGRES_USER', 'ENVIRONMENT']:
            v = os.environ.get(key)
            print(f'{key}: {v}')
        import django
        from django.conf import settings
        django.setup()
        assert settings.DATABASES['default']['ENGINE'] == 'django.db.backends.postgresql'
        print('Django DB config OK')
        "

    - name: Run Django migrations
      run: |
        cd acbc_app
        python manage.py migrate

    - name: Run Django tests with coverage
      run: |
        cd acbc_app
        pip install coverage
        coverage run --source='.' manage.py test --verbosity=2
        coverage report
        coverage html

    - name: Run Django check
      run: |
        cd acbc_app
        python manage.py check --deploy

  publish-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare image names
      run: |
        echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Validate frontend build variables
      env:
        VITE_API_URL: ${{ vars.VITE_API_URL }}
        VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ vars.VITE_GOOGLE_OAUTH_CLIENT_ID }}
      run: |
        test -n "$VITE_API_URL" || (echo "Missing GitHub Repository variable: VITE_API_URL" && exit 1)
        test -n "$VITE_GOOGLE_OAUTH_CLIENT_ID" || (echo "Missing GitHub Repository variable: VITE_GOOGLE_OAUTH_CLIENT_ID" && exit 1)

    - name: Backend image metadata
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}-backend
        tags: |
          type=sha,format=long
          type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: ./acbc_app
        file: ./acbc_app/backend.Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha,scope=backend
        cache-to: type=gha,mode=max,scope=backend

    - name: Frontend image metadata
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}-frontend
        tags: |
          type=sha,format=long
          type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push frontend image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        file: ./frontend/frontend.prod.Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        build-args: |
          VITE_API_URL=${{ vars.VITE_API_URL }}
          VITE_GOOGLE_OAUTH_CLIENT_ID=${{ vars.VITE_GOOGLE_OAUTH_CLIENT_ID }}
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,mode=max,scope=frontend

    - name: Nginx image metadata
      id: meta-nginx
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}-nginx
        tags: |
          type=sha,format=long
          type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push nginx image
      uses: docker/build-push-action@v6
      with:
        context: ./nginx
        file: ./nginx/Dockerfile
        push: true
        tags: ${{ steps.meta-nginx.outputs.tags }}
        labels: ${{ steps.meta-nginx.outputs.labels }}
        cache-from: type=gha,scope=nginx
        cache-to: type=gha,mode=max,scope=nginx

