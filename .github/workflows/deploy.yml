name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.dispatch.outputs.backend == 'true' || steps.filter.outputs.backend == 'true' }}
      frontend: ${{ steps.dispatch.outputs.frontend == 'true' || steps.filter.outputs.frontend == 'true' }}
      nginx: ${{ steps.dispatch.outputs.nginx == 'true' || steps.filter.outputs.nginx == 'true' }}
      ci: ${{ steps.dispatch.outputs.ci == 'true' || steps.filter.outputs.ci == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all components (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: dispatch
        run: |
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"
          echo "nginx=true" >> "$GITHUB_OUTPUT"
          echo "ci=true" >> "$GITHUB_OUTPUT"

      - name: Detect path changes
        if: github.event_name != 'workflow_dispatch'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'acbc_app/**'
              - 'docker-compose*.yml'
              - 'scripts/deploy.sh'
            frontend:
              - 'frontend/**'
              - 'docker-compose*.yml'
              - 'scripts/deploy.sh'
            nginx:
              - 'nginx/**'
              - 'docker-compose*.yml'
              - 'scripts/deploy.sh'
            ci:
              - '.github/workflows/**'

  test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: any_password
          POSTGRES_DB: ACADEMIA_BLOCKCHAIN_DB
          POSTGRES_USER: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('acbc_app/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r acbc_app/requirements.txt

      - name: Set up environment variables
        run: |
          echo "ACADEMIA_BLOCKCHAIN_SKEY=test-secret-key-for-ci" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=any_password" >> $GITHUB_ENV
          echo "DB_NAME=ACADEMIA_BLOCKCHAIN_DB" >> $GITHUB_ENV
          echo "POSTGRES_USER=postgres" >> $GITHUB_ENV
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "GOOGLE_OAUTH_CLIENT_ID=647602001183-2u5t54maog49bc53tf8hkltmv5hhb07s.apps.googleusercontent.com" >> $GITHUB_ENV
          echo "VITE_API_URL=http://localhost:8000" >> $GITHUB_ENV
          echo "DEBUG=True" >> $GITHUB_ENV
          echo "CI=True" >> $GITHUB_ENV
          echo "ENVIRONMENT=CI" >> $GITHUB_ENV
          echo "DJANGO_SETTINGS_MODULE=academia_blockchain.settings" >> $GITHUB_ENV

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create logs directory
        run: mkdir -p acbc_app/logs

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Test database connection
        run: |
          cd acbc_app
          python -c "
          import django
          from django.conf import settings
          django.setup()
          assert settings.DATABASES['default']['ENGINE'] == 'django.db.backends.postgresql'
          print('Django DB config OK')
          "

      - name: Run Django migrations
        run: |
          cd acbc_app
          python manage.py migrate

      - name: Run Django tests with coverage
        run: |
          cd acbc_app
          pip install coverage
          coverage run --source='.' manage.py test --verbosity=2
          coverage report

      - name: Run Django check
        run: |
          cd acbc_app
          python manage.py check --deploy

  frontend-check:
    name: Validate frontend lockfile and build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify package-lock.json matches package.json
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8000/api' }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ vars.VITE_GOOGLE_OAUTH_CLIENT_ID || '647602001183-2u5t54maog49bc53tf8hkltmv5hhb07s.apps.googleusercontent.com' }}
        run: npm run build

  publish-backend:
    name: Publish backend image
    runs-on: ubuntu-latest
    needs: [changes, test, frontend-check]
    if: |
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.frontend-check.result == 'success' || needs.frontend-check.result == 'skipped')
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image names
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./acbc_app
          file: ./acbc_app/backend.Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  publish-frontend:
    name: Publish frontend image
    runs-on: ubuntu-latest
    needs: [changes, test, frontend-check]
    if: |
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.frontend-check.result == 'success' || needs.frontend-check.result == 'skipped')
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image names
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Validate frontend build variables
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ vars.VITE_GOOGLE_OAUTH_CLIENT_ID }}
        run: |
          test -n "$VITE_API_URL" || (echo "Missing GitHub Repository variable: VITE_API_URL" && exit 1)
          test -n "$VITE_GOOGLE_OAUTH_CLIENT_ID" || (echo "Missing GitHub Repository variable: VITE_GOOGLE_OAUTH_CLIENT_ID" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/frontend.prod.Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_GOOGLE_OAUTH_CLIENT_ID=${{ vars.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  publish-nginx:
    name: Publish nginx image
    runs-on: ubuntu-latest
    needs: [changes, test, frontend-check]
    if: |
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.nginx == 'true' || needs.changes.outputs.ci == 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.frontend-check.result == 'success' || needs.frontend-check.result == 'skipped')
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image names
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nginx image metadata
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-nginx
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
