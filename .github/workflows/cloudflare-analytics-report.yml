name: Cloudflare analytics report

on:
  schedule:
    # Mondays 08:00 UTC — weekly analytics + Notion task when actionable
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: Lookback days
        required: false
        default: "7"
      notify_notion:
        description: Create Notion task when actionable
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  report:
    name: Report and notify Notion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ACCOUNT_ID" ]; then
            echo "Missing GitHub secrets: CF_API_TOKEN and CF_ACCOUNT_ID are required."
            exit 1
          fi

      - name: Check Cloudflare API datasets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
        run: python3 scripts/cloudflare_analytics_report.py --check

      - name: Run Cloudflare report and notify if actionable
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
          CF_REPORT_DAYS: ${{ github.event.inputs.days || '7' }}
          CF_NOTION_MIN_SEVERITY: ${{ vars.CF_NOTION_MIN_SEVERITY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          NOTIFY_FLAG=""
          if [ "${{ github.event.inputs.notify_notion || 'true' }}" = "true" ]; then
            NOTIFY_FLAG="--notify-notion"
            if [ -z "$NOTION_API_KEY" ] || [ -z "$NOTION_DATABASE_ID" ]; then
              echo "NOTION_API_KEY and NOTION_DATABASE_ID not set; skipping Notion notify."
              NOTIFY_FLAG=""
            fi
          fi
          python3 scripts/cloudflare_analytics_report.py --days "${CF_REPORT_DAYS}" ${NOTIFY_FLAG}

      - name: Summary
        if: always()
        run: |
          echo "JSON/MD reports are gitignored — run locally to persist under reports/cloudflare/."
          echo "Notion: one Tarea per day when actionable (dedup cf-analytics-YYYY-MM-DD)."
