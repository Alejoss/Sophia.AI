services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile

  backend:
    build:
      context: ./acbc_app
      dockerfile: backend.Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.prod.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_GOOGLE_OAUTH_CLIENT_ID: ${VITE_GOOGLE_OAUTH_CLIENT_ID:-}
